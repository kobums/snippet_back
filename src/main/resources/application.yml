spring:
  application:
    name: snippet

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      # HikariCP 커넥션 풀 설정 (성능 최적화)
      maximum-pool-size: 10                    # 최대 커넥션 수
      minimum-idle: 5                          # 최소 유휴 커넥션 수
      connection-timeout: 20000                # 커넥션 타임아웃 (20초)
      idle-timeout: 300000                     # 유휴 커넥션 타임아웃 (5분)
      max-lifetime: 1200000                    # 커넥션 최대 수명 (20분)
      connection-test-query: SELECT 1          # 커넥션 테스트 쿼리

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        # Hibernate 배치 처리 최적화
        jdbc:
          batch_size: 20                       # 배치 크기
          fetch_size: 50                       # Fetch 크기
        order_inserts: true                    # INSERT 순서 최적화
        order_updates: true                    # UPDATE 순서 최적화
        # 2차 캐시 (선택사항 - 프로덕션에서는 Redis 등 외부 캐시 사용 권장)
        cache:
          use_second_level_cache: false        # 현재는 비활성화
          use_query_cache: false               # 현재는 비활성화
        # 통계 및 로깅
        generate_statistics: false             # 프로덕션에서는 false 권장
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false
    out-of-order: true

affiliate:
  kyobo:
    partner-id: ${KYOBO_PARTNER_ID:}
  yes24:
    partner-id: ${YES24_PARTNER_ID:}

server:
  port: 8008

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

aladin:
  api-key: ${ALADIN_API_KEY:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

naver:
  clova:
    api-url: ${NAVER_CLOVA_API_URL:}
    secret-key: ${NAVER_CLOVA_SECRET_KEY:}

google:
  application:
    credentials: ${GOOGLE_APPLICATION_CREDENTIALS:}
